<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Submission Tracker</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <style>
        html,
        body {
            font-family: 'TeX Gyre Heros', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif, 'Noto Sans CJK SC';
        }

        .serif {
            font-family: 'TeX Gyre Termes', 'Nimbus Roman', 'Times New Roman', 'FreeSerif', 'Noto Serif', serif, 'Noto Serif CJK SC';
        }

        .sans-serif {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif, 'Noto Sans CJK SC';
        }

        .monospace {
            font-family: 'JetBrains Mono NL', 'Noto Sans Mono', 'TeX Gyre Cursor', monospace, 'Noto Sans CJK SC';
        }
    </style>
    <style>
        table, tr, td {
            border: none;
            padding: 0 0 0;
        }
        td:first-child {
            padding-right: 40px;
            font-weight: 600;
        }
    </style>


    <script>
        const all_steps_list = [
            'Submission Created',
            'Awaiting Editor Assignment',
            'Awaiting Review',
            'Awaiting Author Revision (optional)',
            'Accepted',
            'Published',
        ];
        const current_step = parseInt('{{tracker.step}}') - 1;
    </script>
</head>

<body class="sans-serif">
    <div class="wrap p-8 max-w-300 mx-auto">

        <div class="mb-12">
            <h1 class="font-bold text-2xl">Submission Tracker</h1>
            
        </div>

        <div class="pb-10">
            <table>
                <tr>
                    <td>Object ID</td>
                    <td>{{editor.obj_id}}</td>
                </tr>
                <tr>
                    <td>Title</td>
                    <td>{{article.title}}</td>
                </tr>
                <tr>
                    <td>Author(s)</td>
                    <td>{{article.authors_simple}}</td>
                </tr>
            </table>
        </div>

        <div>
            <!-- TODO: Make a vertical progress bar using 'current_step' and 'all_steps_list' and highlight the current step -->
            <div class="space-y-0" id="progress-steps"></div>
        </div>

        <script>
            const stepsContainer = document.getElementById('progress-steps');

            all_steps_list.forEach((step, index) => {
                const isCompleted = index < current_step;
                const isCurrent = index === current_step;
                const isLast = index === all_steps_list.length - 1;

                const stepEl = document.createElement('div');
                stepEl.className = 'flex';

                stepEl.innerHTML = `
                    <div class="flex flex-col items-center mr-4">
                        <div class="
                            w-8 h-8 rounded-full flex items-center justify-center font-semibold
                            ${isCompleted ? 'bg-green-500 text-white' : ''}
                            ${isCurrent ? 'bg-blue-500 text-white ring-4 ring-blue-100' : ''}
                            ${!isCompleted && !isCurrent ? 'bg-gray-200 text-gray-500' : ''}
                        ">
                            ${isCompleted ? '✓' : index + 1}
                        </div>
        
                        ${!isLast
                        ? `<div class="w-0.5 flex-1 min-h-6 ${index < current_step
                            ? 'bg-green-500'
                            : 'bg-gray-300'
                        }"></div>`
                        : ''
                    }
                    </div>
        
                    <div class="pb-0">
                        <div class="font-medium ${isCurrent
                        ? 'text-blue-600'
                        : isCompleted
                            ? 'text-green-600'
                            : 'text-gray-500'
                    }">
                            ${step}
                        </div>
        
                        ${isCurrent
                        ? '<div class="text-sm text-blue-500">Current step</div>'
                        : ''
                    }
                    </div>
                `;

                stepsContainer.appendChild(stepEl);
            });
        </script>

        <div class="flex flex-col gap-7 py-16">
            {{#timeline}}
            <article class="p-4 border-1 border-gray-400 rounded-sm">
                <section class="text-lg">{{note}}</section>
                <div class="text-gray-500 pt-3">{{date}} | {{author}}</div>
            </article>
            {{/timeline}}
        </div>


    </div>

</body>

</html>
