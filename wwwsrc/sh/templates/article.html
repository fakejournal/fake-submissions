<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>{{article.title}} | Issues Archive | Fake Journal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<style>
    html, body {
        font-family: 'TeX Gyre Heros', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif, 'Noto Sans CJK SC';
    }

    .serif {
        font-family: 'TeX Gyre Termes', 'Nimbus Roman', 'Times New Roman', 'FreeSerif', 'Noto Serif', serif, 'Noto Serif CJK SC';
    }

    .sans-serif {
        font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif, 'Noto Sans CJK SC';
    }

    .monospace {
        font-family: 'JetBrains Mono NL', 'Noto Sans Mono', 'TeX Gyre Cursor', monospace, 'Noto Sans CJK SC';
    }
</style>
</head>

<body>
    <div class="app-topbar  w-full bg-white border-b-3 border-black py-0">
    <header>
        <div class="flex grow border-b-1 border-gray-400 px-6 md:px-12 py-5">
            <img src="/pic/fakejournallogo-black.png" alt="Fake Journal Logo" class="h-8">

        </div>
        <style>
            .nav__1780253378 a {
                font-size: 1.1rem;
                font-weight: bold;
            }
        </style>
        <nav class="nav__1780253378  flex grow gap-4 px-6 md:px-12 py-5 items-start">
            <a href="/">Home</a>
            <a href="/issues/">Issues</a>
            <a href="/articles/">Articles</a>
            <a href="/submit/">Submit</a>
        </nav>
    </header>
</div>
<!-- <div style="height: 130px;"></div> -->
<!-- <div class="md:hidden" style="height: 30px;"></div> -->
    <div class="px-6 md:px-12">

    <!-- breadcumb? -->
    <div class="text-sm py-4">
        <a class="underline hover:text-blue-600" href="/">Home</a> /
        <a class="underline hover:text-blue-600" href="../">Articles</a> /
        {{editor.obj_id}}
    </div>

    <div class="grid gap-4 md:gap-8 container mx-auto">
        <div class="sans-serif">
            <div class="pb-3">
                <h1 class="text-3xl font-bold">{{article.title}}</h1>
            </div>
            <div>{{article.authors_simple}}</div>
            <div>
                State:
                {{editor.state}}
            </div>
            <div class="my-8 border-b-1 border-slate-200"></div>
            <div>
                <div data-for-state="final"><a class="inline-block text-center text-lg bg-blue-500 text-white px-2 py-1 rounded-md" style="min-width: 110px;" href="https://artifacts.fakejournal.org/database/{{editor.year}}/{{editor.obj_id}}/final.pdf">Get PDF</a></div>
            </div>

            <!-- border -->
            <div class="my-8 border-b-1 border-slate-200"></div>

            <div>
                <h2 class="text-xl font-bold my-4">Abstract</h2>
                <div>
                    <p class="text-md" style="max-width: 40em;">{{article.abstract}}</p>
                </div>
            </div>

            <!-- border -->
            <div class="my-8 border-b-1 border-slate-200"></div>

            <div>
                <h2 class="text-xl font-bold my-4">Cite this article</h2>
                <div>
                    <pre id="jsPreBibtex" class="monospace text-sm whitespace-pre-wrap"></pre>
                </div>
                <script>
                    (function () {
                        let xhr = new XMLHttpRequest();
                        xhr.open('GET', './info.json');
                        xhr.send();
                        xhr.onload = function () {
                            // console.log(xhr);
                            // console.log(xhr.responseText);
                            function escapeHtml(html) {
                                var text = document.createTextNode(html);
                                var p = document.createElement('p');
                                p.appendChild(text);
                                return p.innerHTML;
                            }
                            let data = JSON.parse(xhr.responseText);
                            console.log(data);
                            // let entry = data.article;
                            const bibtex_str = `@article{fake_${data.editor.obj_id},
                                title = {${data.article.title.trim()}},
                                author = {${data.article.authors_simple}},
                                journal = {Fake},
                                volume = {${data.editor.issue_volume}},
                                year = {${data.editor.date_accept.slice(0, 4)}},
                                month = {${data.editor.date_accept.slice(5, 7)}},
                                eprint = {fake.${data.editor.obj_id}},
                            }`.replace(/\n\s+/g, '\n@').replace(/\n@([^\}])/g, '\n    $1').replace('@}', '}');
                            document.querySelector('#jsPreBibtex').innerHTML = escapeHtml(bibtex_str);
                        };
                    })();
                </script>
            </div>
        </div>
    </div>

</div>
    <div class="app-footer  mt-12 px-6 md:px-12 py-12">
    <footer class="text-slate-500">
        FOOTER
    </footer>
</div>
</body>

</html>
