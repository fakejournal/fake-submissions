<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<style>
    html, body {
        font-family: 'TeX Gyre Heros', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif, 'Noto Sans CJK SC';
    }

    .serif {
        font-family: 'TeX Gyre Termes', 'Nimbus Roman', 'Times New Roman', 'FreeSerif', 'Noto Serif', serif, 'Noto Serif CJK SC';
    }

    .sans-serif {
        font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif, 'Noto Sans CJK SC';
    }

    .monospace {
        font-family: 'JetBrains Mono NL', 'Noto Sans Mono', 'TeX Gyre Cursor', monospace, 'Noto Sans CJK SC';
    }
</style>
</head>

<body>
    <div class="app-topbar  w-full bg-white border-b-3 border-black py-0">
    <header>
        <div class="flex grow border-b-1 border-gray-400 px-6 md:px-12 py-5">
            <img src="/pic/fakejournallogo-black.png" alt="Fake Journal Logo" class="h-8">

        </div>
        <style>
            .nav__1780253378 a {
                font-size: 1.1rem;
                font-weight: bold;
            }
        </style>
        <nav class="nav__1780253378  flex grow gap-4 px-6 md:px-12 py-5 items-start">
            <a href="/">Home</a>
            <a href="/issues/">Issues</a>
            <a href="/articles/">Articles</a>
            <a href="/submit/">Submit</a>
        </nav>
    </header>
</div>
<!-- <div style="height: 130px;"></div> -->
<!-- <div class="md:hidden" style="height: 30px;"></div> -->
    <div class="px-6 md:px-12">
    <!-- breadcumb? -->
    <div class="text-sm py-4">
        <a class="underline hover:text-blue-600" href="../">Home</a> /
        
    </div>
</div>

<div class="px-6 md:px-12">
    <div class="mb-12">
        <h1 class="text-3xl font-bold">All Issues</h1>
    </div>
    <div>
        <div class="grid grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-3 lg:gap-5 container mx-auto">
            {{#issue}}
            <div class="col-span-1">
                <a class="underline hover:text-blue-600 text-2xl" href="./{{issue_id}}/">
                    <div>
                        <img src="https://artifacts.fakejournal.org/pub/{{year}}/{{issue_id}}/issue.pdf.png" alt="" class="border-1 border-gray-400 rounded-xs">
                    </div>
                    <div class="text-center text-md">{{issue_id}}</div>
                </a>
            </div>
            {{/issue}}
        </div>
    </div>
</div>
    <div class="app-footer  mt-12 px-6 md:px-12 py-12">
    <footer class="text-slate-500">
        FOOTER
    </footer>
</div>
</body>

</html>
