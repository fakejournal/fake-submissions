<div class="px-6 md:px-12">

    <!-- breadcumb? -->
    <div class="container mx-auto text-sm py-4">
        <a class="underline hover:text-blue-600" href="../../" data-i18n="en:Home|zh:首页">Home</a> /
        <a class="underline hover:text-blue-600" href="../" data-i18n="en:Articles|zh:所有文章">Articles</a> /
        <!-- {{editor.obj_id}} -->
    </div>

    <div class="container mx-auto">
        <div class="StdSinglePageContent">
            <aside class="pb-1  text-lg ">{{editor.obj_id}}</aside>
            <h1>{{article.title}}</h1>
        </div>
    </div>

    <div class="grid gap-4 md:gap-8 container mx-auto">
        <div class="sans-serif">
            <!-- <div class="pb-3">
                <h1 class="text-3xl font-bold">{{article.title}}</h1>
            </div> -->
            <div>{{article.authors_simple}}</div>
            <div>
                <span data-i18n="en:State|zh:状态">...</span>:
                {{editor.state}}
            </div>
            <div class="my-8 border-b-1 border-slate-200"></div>
            <div class="flex flex-col lg:flex-row wrap items-start lg:items-center gap-12">
                <div data-for-state="final">
                    <a class="block text-center text-lg bg-blue-500 text-white px-2 py-1 rounded-md min-w-40" href="https://artifacts.fakejournal.org/database/{{editor.year}}/{{editor.obj_id}}/final.pdf">
                        <!-- <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-file-text-icon lucide-file-text">
                            <path d="M6 22a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h8a2.4 2.4 0 0 1 1.704.706l3.588 3.588A2.4 2.4 0 0 1 20 8v12a2 2 0 0 1-2 2z" />
                            <path d="M14 2v5a1 1 0 0 0 1 1h5" />
                            <path d="M10 9H8" />
                            <path d="M16 13H8" />
                            <path d="M16 17H8" />
                        </svg> -->
                        <!-- PDF -->
                        <span data-i18n="en:Read PDF|zh:阅读 PDF"></span>
                    </a>
                </div>
                <div><a href="../../tracker/{{editor.obj_id}}/">Tracker</a></div>
                <div class="jsArticleInteractionWidget" data-objid="{{editor.obj_id}}"></div>
            </div>

            <!-- border -->
            <div class="my-8 border-b-1 border-slate-200"></div>

            <div>
                <h2 class="text-xl font-bold my-4">Abstract</h2>
                <div>
                    <p class="text-md" style="max-width: 40em;">{{article.abstract}}</p>
                </div>
            </div>

            <!-- border -->
            <div class="my-8 border-b-1 border-slate-200"></div>

            <div class="hidden">
                <h2 class="text-xl font-bold my-4">Cite this article</h2>
                <div>
                    <pre id="jsPreBibtex" class="monospace text-sm whitespace-pre-wrap"></pre>
                </div>
                <script>
                    (function () {
                        let xhr = new XMLHttpRequest();
                        xhr.open('GET', './info.json');
                        xhr.send();
                        xhr.onload = function () {
                            // console.log(xhr);
                            // console.log(xhr.responseText);
                            function escapeHtml(html) {
                                var text = document.createTextNode(html);
                                var p = document.createElement('p');
                                p.appendChild(text);
                                return p.innerHTML;
                            }
                            let data = JSON.parse(xhr.responseText);
                            console.log(data);
                            // let entry = data.article;
                            const bibtex_str = `@article{fake_${data.editor.obj_id},
                                title = {${data.article.title.trim()}},
                                author = {${data.article.authors_simple}},
                                journal = {Fake},
                                volume = {${data.editor.issue_volume}},
                                year = {${data.editor.date_accept.slice(0, 4)}},
                                month = {${data.editor.date_accept.slice(5, 7)}},
                                eprint = {fake.${data.editor.obj_id}},
                            }`.replace(/\n\s+/g, '\n@').replace(/\n@([^\}])/g, '\n    $1').replace('@}', '}');
                            document.querySelector('#jsPreBibtex').innerHTML = escapeHtml(bibtex_str);
                        };
                    })();
                </script>
            </div>
        </div>
    </div>

</div>
