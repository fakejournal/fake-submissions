<div class="px-6 md:px-12">
    <div class="mb-12">
        <!-- <h1 class="text-3xl font-bold">Home</h1> -->
    </div>

    <!-- Featured -->
    <div class="flex flex-col container mx-auto mb-20">
        <div class="bg-slate-500">
            <style>
                .local--feature-splash-bg {
                    background: #222530 url('{{featured.imgurl}}') scroll no-repeat center right;
                    background-size: contain;
                }

                .local--feature-splash-bg--inner {
                    background-color: #222530;
                }

                @media screen and (max-width: 800px) {
                    .local--feature-splash-bg {
                        background-size: cover;
                    }

                    .local--feature-splash-bg--inner {
                        background-color: #222530aa;
                    }
                }
            </style>
            <div class="local--feature-splash-bg grid lg:grid-cols-2" style="">
                <div class="p-6 lg:p-12 text-white min-h-130 lg:min-h-120  local--feature-splash-bg--inner">
                    <!-- Edit this node to change target -->
                    <a attr-en-href="{{featured.en.href}}" attr-zh-href="{{featured.zh.href}}">
                        <h2 class="text-4xl m-0 pb-12 font-bold">
                            <span i18n-for="en">{{featured.en.title}}</span>
                            <span i18n-for="zh">{{featured.zh.title}}</span>
                        </h2>
                    </a>
                    <aside class="m-0 pb-4">
                        <span i18n-for="en">{{featured.en.desc}}</span>
                        <span i18n-for="zh">{{featured.zh.desc}}</span>
                    </aside>
                </div>
            </div>
        </div>
    </div>

    <div class="flex flex-col lg:flex-row gap-12 lg:gap-20 container mx-auto">
        <!-- Main -->
        <div class="grid md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-22 lg:gap-10">
            <!-- Show latest issue -->
            <div class="flex flex-col border-b-1 border-gray-500 pb-2" style="transition: all 180ms ease;">
                <div class="block grow flex flex-col">
                    <img src="https://artifacts.fakejournal.org/pub/{{last.issue.year}}/{{last.issue.issue_volume}}/issue.pdf.png" alt="" class="border-1 border-gray-400 rounded-xs">
                    <div class="grow"></div>
                    <div class="h-5"></div>
                    <a class="block text-center text-lg bg-blue-500 text-white px-2 py-1 rounded-md" href="./issues/{{last.issue.issue_volume}}/">Read</a>
                    <div class="flex shrink flex-wrap flex-col xl:flex-row xl:place-content-between items-start text-gray-600">
                        <div class="">
                            <div class="pt-4 pb-2">{{article.authors_simple}}</div>
                            <span class="font-bold text-black" data-i18n="en:Latest Issue|zh:最新期刊">
                            </span>
                            |
                            {{last.issue.issue_volume}}
                        </div>
                    </div>
                </div>
            </div>

            <!-- Begin articles list -->
            {{#list}}
            <div class="flex flex-col border-b-1 border-gray-500 pb-2" style="transition: all 180ms ease;">
                <a class="block grow flex flex-col" href="./articles/{{editor.obj_id}}/">
                    <div class="shrink text-lg md:text-xl sans font-bold leading-5 md:leading-7 pb-2 underline">
                        {{article.title}}
                    </div>
                    <div class="grow"></div>
                    <div class="flex shrink flex-wrap flex-col xl:flex-row xl:place-content-between items-start text-gray-600">
                        <div class="">
                            <div class="pt-4 pb-2">{{article.authors_simple}}</div>
                            <span class="font-bold text-black">
                                {{editor.category_label}}
                            </span>
                            |
                            {{editor.date_accept}}
                        </div>
                    </div>
                </a>
            </div>
            {{/list}}
        </div>
    </div>
</div>
