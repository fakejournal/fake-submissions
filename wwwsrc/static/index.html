<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="refresh" content="1;url=/en/" id="metaredir">

    <title>Fake Journal - The Journal of Unverifiable Discoveries</title>

    <style>
        html,
        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif, 'Noto Sans CJK SC', 'MiSans', 'OPPO Sans';

<body>

    <section>

        <div><a href="/zh/">简体中文</a></div>

        Not redirecting? Click the link above to go.

        document.querySelector('#metaredir').remove();

            location.href = '/en/';
        }
