[article]
title = """
学术论文AIGC检测率与同行评议评分的关联：一项实证研究
"""

authors_simple = "Li Hua, et al"       # Simplest plain text format to indicate authors

abstract = """
目的：随着生成式人工智能在学术写作中的广泛使用，各类AIGC检测工具被期刊编辑和审稿人用于评估稿件真实性。然而，这些检测工具的评分是否影响同行评议过程进而与稿件评审结果产生关联，尚缺乏系统性的实证证据。本研究旨在检验学术论文AIGC检测率与同行评议评分之间的关系。
方法：收集197篇投稿论文，使用主流通用AIGC检测工具量化文本生成概率，同时记录同行评议综合评分、论文字数、参考文献数量、研究类型、基金资助情况及学科类别。采用渐进式多元线性回归模型检验AIGC检测率与评议评分的关系。
结果：AIGC检测率与同行评议评分呈显著负相关（β = -0.183, p = 0.029, R² = 0.025）。在控制稿件特征后，该系数的绝对值有所缩小但维持边缘显著（β = -0.154, p = 0.050）。加入学科固定效应后，关联强度保持稳定（β = −0.158, p = 0.036）。补充分析显示，AIGC检测率与审稿人之间的评分分歧呈强正相关（β = 0.067, R² = 0.837, p < 0.001）。
结论：AIGC检测率与同行评议评分之间存在微弱但稳健的负向关联。高AIGC检测率的稿件更可能获得较低的评审分数，同时审稿人对其质量的分歧也更大。这一发现对学术出版中AI检测工具的使用具有启示意义。
"""






